    <script>
        // Fetch and render the PRD markdown
        fetch('PRD.md')
            .then(response => response.text())
            .then(markdown => {
                // Configure marked options
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: true,
                    mangle: false
                });

                // Convert markdown to HTML
                const html = marked.parse(markdown);

                // Insert into page
                document.getElementById('content').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('content').innerHTML =
                    '<p style="color: red;">Error loading PRD document. Please check the console for details.</p>';
                console.error('Error loading PRD:', error);
            });
    </script>
